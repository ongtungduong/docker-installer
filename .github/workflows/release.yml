name: Release Airgap Bundles

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true

# Least privilege: build jobs only read; only the release job writes.
permissions:
  contents: read

env:
  VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build:
    name: Bundle ${{ matrix.distro }} (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Cross product: 2 arches x 13 distros = 26 bundles.
      # distro is encoded "<os>-<version>" (no os/version contains a hyphen).
      matrix:
        arch: [amd64, arm64]
        distro:
          - ubuntu-jammy
          - ubuntu-noble
          - ubuntu-resolute
          - debian-bullseye
          - debian-bookworm
          - debian-trixie
          - rhel-8
          - rhel-9
          - rhel-10
          - centos-9
          - centos-10
          - fedora-43
          - fedora-44
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build self-contained bundle
        run: |
          set -euo pipefail
          distro="${{ matrix.distro }}"
          os="${distro%%-*}"
          version="${distro#*-}"
          arch="${{ matrix.arch }}"

          bash install-docker.sh --airgap --prepare --os "$os" --os-version "$version" --arch "$arch"

          src=$(ls -d docker-*/ | head -1)
          bundle="docker-${os}-${version}-${arch}"
          mv "$src" "$bundle"
          cp install-docker.sh "$bundle/install-docker.sh"
          printf '%s\n' \
            "Docker Engine airgap bundle — ${os} ${version} (${arch})" \
            "Release: ${VERSION}" \
            "" \
            "Offline install:" \
            "  1. Copy this folder to the target machine." \
            "  2. Run:  sudo ./install-docker.sh --airgap \"\$(pwd)\"" \
            "" \
            "Contents:" \
            "  *.deb / *.rpm       Docker Engine, CLI, containerd, buildx, compose plugins" \
            "  checksums.sha256    package integrity checksums (verified automatically)" \
            "  install-docker.sh   installer script" \
            > "$bundle/INSTALL.txt"

          tar -czf "${bundle}.tar.gz" "$bundle"
          echo "Built ${bundle}.tar.gz:"
          tar -tzf "${bundle}.tar.gz"
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.distro }}-${{ matrix.arch }}
          path: docker-*.tar.gz
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bundle-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          count=$(ls -1 *.tar.gz | wc -l)
          echo "Total bundles: $count"
          # All-or-nothing: never publish a partial set (13 distros x 2 arches).
          [ "$count" -eq 26 ] || { echo "::error::expected 26 bundles, got $count"; exit 1; }
          sha256sum -- *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
