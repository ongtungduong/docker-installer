name: Test Docker Installation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCRIPT_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/install-docker.sh

jobs:
  apt-distros:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Ubuntu 22.04",  image: "ubuntu:22.04",  os: ubuntu, version: jammy }
          - { name: "Ubuntu 24.04",  image: "ubuntu:24.04",  os: ubuntu, version: noble }
          - { name: "Ubuntu 26.04",  image: "ubuntu:26.04",  os: ubuntu, version: resolute }
          - { name: "Debian 11",     image: "debian:11",     os: debian, version: bullseye }
          - { name: "Debian 12",     image: "debian:12",     os: debian, version: bookworm }
          - { name: "Debian 13",     image: "debian:13",     os: debian, version: trixie }
    steps:
      - name: Install curl
        run: apt-get update -y && apt-get install -y curl sudo
      - name: Download installer
        run: curl -sSL ${{ env.SCRIPT_URL }} -o /tmp/install-docker.sh
      - name: Install Docker
        run: |
          printf '#!/bin/bash\nexit 0\n' > /usr/local/bin/systemctl && chmod +x /usr/local/bin/systemctl
          bash /tmp/install-docker.sh --yes
      - name: Verify Docker version
        run: docker --version
      - name: Verify Docker Compose version
        run: docker compose version
      - name: Test airgap prepare (dry-run)
        run: bash /tmp/install-docker.sh --airgap --prepare --os ${{ matrix.os }} --os-version ${{ matrix.version }} --arch amd64 --dry-run

  dnf-distros:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "RHEL 8",            image: "registry.access.redhat.com/ubi8/ubi",    os: rhel,   version: "8" }
          - { name: "RHEL 9",            image: "registry.access.redhat.com/ubi9/ubi",    os: rhel,   version: "9" }
          - { name: "RHEL 10",           image: "registry.access.redhat.com/ubi10/ubi",   os: rhel,   version: "10" }
          - { name: "CentOS Stream 9",   image: "quay.io/centos/centos:stream9",          os: centos, version: "9" }
          - { name: "CentOS Stream 10",  image: "quay.io/centos/centos:stream10",         os: centos, version: "10" }
          - { name: "Fedora 43",         image: "fedora:43",                              os: fedora, version: "43" }
          - { name: "Fedora 44",         image: "fedora:44",                              os: fedora, version: "44" }
    steps:
      - name: Install curl
        run: dnf install -y --allowerasing curl sudo
      - name: Download installer
        run: curl -sSL ${{ env.SCRIPT_URL }} -o /tmp/install-docker.sh
      - name: Install Docker
        run: |
          printf '#!/bin/bash\nexit 0\n' > /usr/local/bin/systemctl && chmod +x /usr/local/bin/systemctl
          bash /tmp/install-docker.sh --yes
      - name: Verify Docker version
        run: docker --version
      - name: Verify Docker Compose version
        run: docker compose version
      - name: Test airgap prepare (dry-run)
        run: bash /tmp/install-docker.sh --airgap --prepare --os ${{ matrix.os }} --os-version ${{ matrix.version }} --arch x86_64 --dry-run

  # Real airgap end-to-end: download packages, then install offline from them.
  airgap-smoke:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "Airgap Ubuntu 24.04", image: "ubuntu:24.04", os: ubuntu, version: noble, arch: amd64 }
          - { name: "Airgap Fedora 43",    image: "fedora:43",    os: fedora, version: "43", arch: x86_64 }
    steps:
      - name: Install prerequisites
        run: |
          if command -v apt-get >/dev/null; then
            apt-get update -y && apt-get install -y curl sudo
          else
            dnf install -y --allowerasing curl sudo
          fi
      - name: Download installer
        run: curl -sSL ${{ env.SCRIPT_URL }} -o /tmp/install-docker.sh
      - name: Airgap prepare (real download) then offline install
        run: |
          printf '#!/bin/bash\nexit 0\n' > /usr/local/bin/systemctl && chmod +x /usr/local/bin/systemctl
          cd /tmp
          bash /tmp/install-docker.sh --airgap --prepare \
            --os ${{ matrix.os }} --os-version ${{ matrix.version }} --arch ${{ matrix.arch }}
          dir=$(ls -d docker-*/ | head -1)
          echo "Prepared package directory: $dir"
          bash /tmp/install-docker.sh --airgap "/tmp/${dir}"
      - name: Verify Docker version
        run: docker --version
      - name: Verify Docker Compose version
        run: docker compose version
